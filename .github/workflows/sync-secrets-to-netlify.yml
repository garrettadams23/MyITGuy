name: Sync secrets to Netlify

# Manual trigger only - run this from the Actions tab whenever a secret
# below is added or rotated. GitHub Secrets are only readable inside
# Actions workflow runs, so this pushes their values into Netlify's own
# environment variables, which is what the live Netlify Functions read
# from at request time.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which Netlify site to sync env vars to"
        type: choice
        options:
          - testing
          - production
        default: testing

jobs:
  sync:
    name: Push environment variables to Netlify
    runs-on: ubuntu-latest
    steps:
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Resolve target site ID
        id: site
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            echo "site_id=${{ vars.NETLIFY_SITE_ID_PRODUCTION }}" >> "$GITHUB_OUTPUT"
          else
            echo "site_id=${{ vars.NETLIFY_SITE_ID_TESTING }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set environment variables on Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ steps.site.outputs.site_id }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_TO_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_JWKS_URL: ${{ secrets.SUPABASE_JWKS_URL }}
        run: |
          for name in RESEND_API_KEY NOTIFY_FROM_EMAIL NOTIFY_TO_EMAIL \
                      SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SECRET_KEY SUPABASE_JWKS_URL; do
            value="${!name}"
            if [ -n "$value" ]; then
              echo "Setting $name (secret) on Netlify"
              netlify env:set "$name" "$value" --secret
            else
              echo "Skipping $name (no GitHub secret set for it)"
            fi
          done
