<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My IT Guy - Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
    font-family: 'Montserrat', sans-serif;
  }

  .card-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  .label {
    font-size: 11px;
    color: #666;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    align-self: flex-start;
    margin-bottom: -20px;
  }

  /* ─── FRONT ─── */
  .card-front {
    width: 700px;
    height: 389px;
    background: #0d1f3c;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.45);
  }
  .card-front::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(74,163,198,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card-front::after {
    content: '';
    position: absolute;
    bottom: -100px; left: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(74,163,198,0.07) 0%, transparent 70%);
    border-radius: 50%;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .year {
    font-size: 30px;
    font-weight: 800;
    color: white;
    letter-spacing: 1px;
  }
  .brand-name {
    font-size: 62px;
    font-weight: 900;
    color: white;
    letter-spacing: 8px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  .tagline {
    font-size: 13.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.58);
    letter-spacing: 3.5px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  .divider {
    width: 380px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(74,163,198,0.5), transparent);
    margin: 2px 0;
    position: relative;
    z-index: 1;
  }
  .contact-row {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 14px;
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.4px;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }
  .contact-row .sep { color: rgba(74,163,198,0.7); }
  .contact-row .ico { color: #4aa3c6; }

  /* ─── BACK ─── */
  .card-back {
    width: 700px;
    height: 389px;
    border-radius: 14px;
    display: flex;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.3);
  }

  .back-left {
    width: 185px;
    background: #0d1f3c;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 26px 16px 22px;
  }

  .back-logo-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .back-logo-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .back-year {
    font-size: 13px;
    font-weight: 800;
    color: white;
  }
  .back-brand {
    font-size: 16px;
    font-weight: 900;
    color: white;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  /* back-tag (tagline) removed from back */

  .qr-wrap {
    background: white;
    padding: 7px;
    border-radius: 6px;
  }
  #qr-canvas { display: block; }

  /* ─── BACK RIGHT ─── */
  .back-right {
    flex: 1;
    padding: 20px 24px 20px 26px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: #f8f8f8;
    gap: 0;
  }

  .person-name {
    font-size: 22px;
    font-weight: 700;
    color: #0d1f3c;
    margin-bottom: 14px;
  }

  .services-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, #0d1f3c55, #4aa3c640, transparent);
    margin-bottom: 14px;
  }

  /* Single column, stacked vertically */
  .services-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .service-icon {
    width: 32px;
    height: 32px;
    background: #0d1f3c;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .service-icon svg {
    width: 17px;
    height: 17px;
  }

  .service-label {
    font-size: 14px;
    font-weight: 700;
    color: #0d1f3c;
    letter-spacing: 0.3px;
    line-height: 1.2;
  }
</style>
</head>
<body>
<div class="card-wrapper">

  <div class="label">Front</div>

  <!-- FRONT -->
  <div class="card-front">
    <div class="logo-row">
      <span class="year">20</span>
      <svg viewBox="0 0 100 115" width="96" height="96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,5 93,27.5 93,87.5 50,110 7,87.5 7,27.5"
                 fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round"/>
        <line x1="27" y1="43" x2="73" y2="43" stroke="white" stroke-width="7.5" stroke-linecap="round"/>
        <line x1="50" y1="43" x2="50" y2="83" stroke="white" stroke-width="7.5" stroke-linecap="round"/>
      </svg>
      <span class="year">26</span>
    </div>
    <div class="brand-name">My IT Guy</div>
    <div class="tagline">Helping Users, One Click at a Time</div>
    <div class="divider"></div>
    <div class="contact-row">
      <span><span class="ico">☎</span> +1 240.380.6042</span>
      <span class="sep">|</span>
      <span><span class="ico">✉</span> garrettadams1010@gmail.com</span>
      <span class="sep">|</span>
      <span><span class="ico">⊕</span> myitguy.netlify.app</span>
    </div>
  </div>

  <div class="label">Back</div>

  <!-- BACK -->
  <div class="card-back">
    <div class="back-left">
      <div class="back-logo-stack">
        <div class="back-logo-row">
          <span class="back-year">20</span>
          <svg viewBox="0 0 100 115" width="48" height="55" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,5 93,27.5 93,87.5 50,110 7,87.5 7,27.5"
                     fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>
            <line x1="27" y1="43" x2="73" y2="43" stroke="white" stroke-width="9" stroke-linecap="round"/>
            <line x1="50" y1="43" x2="50" y2="83" stroke="white" stroke-width="9" stroke-linecap="round"/>
          </svg>
          <span class="back-year">26</span>
        </div>
        <div class="back-brand">My IT Guy</div>
        <!-- Tagline removed from back -->
      </div>
      <div class="qr-wrap">
        <canvas id="qr-canvas" width="130" height="130"></canvas>
      </div>
    </div>

    <div class="back-right">
      <div class="person-name">Garrett Adams</div>
      <div class="services-divider"></div>

      <!-- Services stacked vertically, one after another -->
      <div class="services-list">

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4aa3c6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="5" rx="1"/>
              <rect x="2" y="10" width="20" height="5" rx="1"/>
              <rect x="2" y="17" width="20" height="5" rx="1"/>
              <circle cx="18" cy="5.5" r="1" fill="#4aa3c6" stroke="none"/>
              <circle cx="18" cy="12.5" r="1" fill="#4aa3c6" stroke="none"/>
              <circle cx="18" cy="19.5" r="1" fill="#4aa3c6" stroke="none"/>
            </svg>
          </div>
          <div class="service-label">IT Infrastructure</div>
        </div>

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4aa3c6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
          </div>
          <div class="service-label">Website Development</div>
        </div>

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4aa3c6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21h6"/>
              <path d="M12 3a6 6 0 0 1 6 6c0 2.5-1.5 4.5-3 6H9c-1.5-1.5-3-3.5-3-6a6 6 0 0 1 6-6z"/>
            </svg>
          </div>
          <div class="service-label">Tech Solutions Consulting</div>
        </div>

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4aa3c6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              <polyline points="9 12 11 14 15 10"/>
            </svg>
          </div>
          <div class="service-label">Digital Security</div>
        </div>

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4aa3c6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>

          <div class="service-label">Systems Management</div>
        </div>

        <div class="service-item">

            <svg viewBox="0 0 24 24" fill="none" stroke="#4aa3c6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>

      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const tmp = document.createElement('div');
  tmp.style.position = 'absolute';
  tmp.style.left = '-9999px';
  document.body.appendChild(tmp);

  new QRCode(tmp, {
    text: "https://myitguy.netlify.app/",
    width: 130,
    height: 130,
    colorDark: "#0d1f3c",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  setTimeout(() => {
    const src = tmp.querySelector('canvas') || tmp.querySelector('img');
    const dest = document.getElementById('qr-canvas');
    const ctx = dest.getContext('2d');
    if (src && src.tagName === 'CANVAS') {
      ctx.drawImage(src, 0, 0, 130, 130);
    } else if (src && src.tagName === 'IMG') {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, 130, 130);
      img.src = src.src;
    }
    document.body.removeChild(tmp);
  }, 300);
</script>
</body>
</html>
